<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTE 分数查询工具 - by Alexli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07050f;--card:#0f0b20;--card2:#160f2e;
  --border:rgba(167,139,250,0.1);--border2:rgba(167,139,250,0.25);
  --p3:#c4b5fd;--p4:#a78bfa;
  --txt:#ece8ff;--txt2:#9b8fc0;--txt3:#4e4470;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem}

.topbar{display:flex;align-items:center;padding-bottom:1.5rem;border-bottom:0.5px solid var(--border);margin-bottom:2.5rem}
.logo{display:flex;align-items:center;gap:12px}
.logo-mark{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#7c3aed,#a78bfa);box-shadow:0 0 20px rgba(124,58,237,0.5)}
.logo-mark svg{width:18px;height:18px;fill:white}
.logo-text{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;background:linear-gradient(90deg,#e8e0ff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:11px;color:var(--txt3);margin-top:2px;font-style:italic}

.hero{text-align:center;margin-bottom:3rem;padding-top:0.5rem}
.hero-eyebrow{font-size:11px;color:var(--p4);letter-spacing:0.16em;text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;justify-content:center;gap:10px;opacity:0.75}
.el{width:40px;height:0.5px;background:linear-gradient(90deg,transparent,var(--p4))}
.er{width:40px;height:0.5px;background:linear-gradient(90deg,var(--p4),transparent)}
.hero-title{font-family:'Syne',sans-serif;font-size:42px;font-weight:700;line-height:1.1;letter-spacing:-0.5px;margin-bottom:8px}
.g1{background:linear-gradient(110deg,#fff 0%,#e0d7ff 35%,#a78bfa 70%,#7c3aed 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g2{background:linear-gradient(110deg,#c4b5fd 0%,#818cf8 50%,#6d28d9 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-byline{font-size:13px;color:var(--txt3);font-style:italic;margin-bottom:16px}
.hero-byline b{color:var(--p4);font-style:normal;font-weight:500}
.glow-line{width:160px;height:1px;background:linear-gradient(90deg,transparent,#7c3aed,#a78bfa,#7c3aed,transparent);margin:0 auto 20px;opacity:0.5}
.hero-desc{font-size:15px;color:var(--txt2);line-height:1.75;max-width:460px;margin:0 auto}

.step-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.step-num{width:20px;height:20px;border-radius:50%;background:rgba(124,58,237,0.18);border:0.5px solid rgba(124,58,237,0.45);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--p4);flex-shrink:0}
.step-lbl{font-size:12px;font-weight:500;color:var(--txt3);letter-spacing:0.06em;text-transform:uppercase}

.cat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem}
.cat-card{border:0.5px solid var(--border);border-radius:14px;padding:16px 18px;cursor:pointer;transition:all 0.2s;background:var(--card)}
.cat-card:hover{border-color:var(--border2);background:var(--card2)}
.cat-card.active{border-color:rgba(167,139,250,0.4);background:linear-gradient(135deg,rgba(124,58,237,0.14),rgba(109,40,217,0.06));box-shadow:inset 0 1px 0 rgba(255,255,255,0.04)}
.cat-icon{font-size:18px;margin-bottom:8px}
.cat-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;color:var(--txt)}
.cat-card.active .cat-name{background:linear-gradient(90deg,#ddd6fe,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cat-desc{font-size:13px;color:var(--txt3);margin-top:4px}

.country-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem}
.c-pill{padding:7px 18px;border:0.5px solid var(--border);border-radius:999px;cursor:pointer;font-size:14px;color:var(--txt2);background:var(--card);transition:all 0.18s}
.c-pill:hover{border-color:var(--border2);color:var(--txt)}
.c-pill.active{background:linear-gradient(135deg,rgba(124,58,237,0.22),rgba(109,40,217,0.12));border-color:rgba(167,139,250,0.42);color:#ddd6fe;font-weight:500}

.search-box{display:flex;gap:8px;margin-bottom:2rem}
.ac-wrap{flex:1;position:relative}
.search-input{width:100%;padding:12px 16px;border:0.5px solid var(--border);border-radius:12px;font-size:15px;background:var(--card);color:var(--txt);outline:none;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.search-input:focus{border-color:rgba(167,139,250,0.5);box-shadow:0 0 0 3px rgba(124,58,237,0.1)}
.search-input::placeholder{color:var(--txt3)}
.btn-search{padding:12px 24px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:white;border:none;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 4px 16px rgba(109,40,217,0.4);transition:all 0.2s;white-space:nowrap}
.btn-search:hover{box-shadow:0 4px 22px rgba(109,40,217,0.65);transform:translateY(-1px)}

.autocomplete{position:absolute;top:100%;left:0;right:0;background:var(--card2);border:0.5px solid var(--border2);border-radius:10px;z-index:10;margin-top:4px;max-height:220px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,0.5)}
.ac-item{padding:10px 14px;font-size:14px;cursor:pointer;color:var(--txt);border-bottom:0.5px solid var(--border)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:rgba(167,139,250,0.08)}
.ac-sub{font-size:12px;color:var(--txt3);margin-top:2px}

.results-area{margin-top:0}
.school-card{background:var(--card);border:0.5px solid var(--border);border-radius:16px;margin-bottom:12px;overflow:hidden;transition:border-color 0.2s}
.school-card:hover{border-color:var(--border2)}
.school-head{padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:0.5px solid var(--border);background:var(--card2)}
.sflag{font-size:22px}
.sname{font-family:'Syne',sans-serif;font-size:16px;font-weight:600;background:linear-gradient(90deg,#e8e0ff,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sname-en{font-size:13px;color:var(--txt3);margin-top:2px}

.prog-wrap{overflow-x:auto}
table.ptab{width:100%;border-collapse:collapse;font-size:14px;min-width:560px}
.ptab th{padding:9px 16px;text-align:left;font-size:11px;font-weight:500;color:var(--txt3);background:rgba(255,255,255,0.015);border-bottom:0.5px solid var(--border);letter-spacing:0.05em;text-transform:uppercase}
.ptab td{padding:12px 16px;border-bottom:0.5px solid var(--border);vertical-align:middle;color:var(--txt)}
.ptab tr:last-child td{border-bottom:none}
.ptab tr:hover td{background:rgba(167,139,250,0.04)}

.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:500}
.badge.yes{background:rgba(29,158,117,0.12);color:#5DCAA5;border:0.5px solid rgba(29,158,117,0.22)}
.badge.no{background:rgba(226,75,74,0.1);color:#F09595;border:0.5px solid rgba(226,75,74,0.18)}
.badge.unk{background:rgba(136,135,128,0.1);color:#888780;border:0.5px solid rgba(136,135,128,0.18)}
.badge-dot{width:5px;height:5px;border-radius:50%}
.badge.yes .badge-dot{background:#1D9E75}
.badge.no .badge-dot{background:#E24B4A}
.badge.unk .badge-dot{background:#888780}

.score-big{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;background:linear-gradient(135deg,#ddd6fe,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.score-parts{font-size:12px;color:var(--txt3);margin-top:3px}
.src-link{font-size:12px;color:var(--p4);text-decoration:none}
.src-link:hover{color:var(--p3);text-decoration:underline}
.upd{font-size:12px;color:var(--txt3)}

.state-box{text-align:center;padding:3rem 1rem;color:var(--txt3);font-size:15px}
.state-icon{font-size:32px;margin-bottom:12px;opacity:0.4}
.loading-dots{display:inline-flex;gap:4px;vertical-align:middle;margin-left:6px}
.loading-dots span{width:6px;height:6px;background:var(--p4);border-radius:50%;animation:blink 1.2s ease-in-out infinite}
.loading-dots span:nth-child(2){animation-delay:0.2s}
.loading-dots span:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,100%{opacity:0.2}50%{opacity:1}}

/* ── 悬浮机器人 ── */
.bot-wrap{position:fixed;bottom:28px;right:28px;display:flex;flex-direction:column;align-items:flex-end;gap:10px;z-index:999}

.bot-tooltip{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:white;font-size:13px;font-weight:500;padding:7px 14px;border-radius:999px;white-space:nowrap;box-shadow:0 4px 16px rgba(109,40,217,0.5);opacity:0;transform:translateX(8px);transition:all 0.25s;pointer-events:none;font-family:'DM Sans',sans-serif}
.bot-btn{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a78bfa);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(109,40,217,0.55);transition:box-shadow 0.2s,transform 0.2s;animation:botbob 3s ease-in-out infinite}
.bot-btn:hover{transform:scale(1.08) !important;box-shadow:0 6px 28px rgba(109,40,217,0.75);animation:none}
.bot-btn svg{width:26px;height:26px;fill:white}
.bot-trigger:hover .bot-tooltip{opacity:1;transform:translateX(0)}
@keyframes botbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

.chat-window{width:310px;background:#0f0b20;border:0.5px solid rgba(167,139,250,0.25);border-radius:18px;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,0.65);display:none;flex-direction:column}
.chat-window.open{display:flex;animation:popUp 0.2s ease}
@keyframes popUp{from{opacity:0;transform:scale(0.92) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}

.chat-header{padding:12px 16px;background:linear-gradient(135deg,rgba(124,58,237,0.35),rgba(109,40,217,0.2));border-bottom:0.5px solid rgba(167,139,250,0.15);display:flex;align-items:center;justify-content:space-between}
.chat-header-left{display:flex;align-items:center;gap:8px}
.chat-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a78bfa);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-avatar svg{width:16px;height:16px;fill:white}
.chat-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:var(--txt)}
.chat-subtitle{font-size:11px;color:var(--txt3);margin-top:1px}
.chat-close{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,0.06);border:none;cursor:pointer;color:var(--txt3);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0}
.chat-close:hover{background:rgba(255,255,255,0.12);color:var(--txt)}

.chat-messages{padding:14px 12px;display:flex;flex-direction:column;gap:10px;max-height:300px;overflow-y:auto;min-height:100px}
.chat-messages::-webkit-scrollbar{width:3px}
.chat-messages::-webkit-scrollbar-thumb{background:rgba(167,139,250,0.2);border-radius:3px}

.msg{max-width:90%;font-size:13px;line-height:1.6;padding:8px 12px;border-radius:12px;word-break:break-word}
.msg.bot{background:rgba(124,58,237,0.15);border:0.5px solid rgba(167,139,250,0.15);color:#c4b5fd;align-self:flex-start;border-bottom-left-radius:4px}
.msg.user{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:white;align-self:flex-end;border-bottom-right-radius:4px}
.msg.typing{display:flex;gap:4px;align-items:center;padding:10px 14px}
.typing-dot{width:6px;height:6px;background:rgba(167,139,250,0.5);border-radius:50%;animation:tdot 1.2s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:0.2s}
.typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes tdot{0%,100%{opacity:0.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}

.chat-input-row{display:flex;gap:6px;padding:10px 12px;border-top:0.5px solid rgba(167,139,250,0.1)}
.chat-input{flex:1;padding:8px 12px;border:0.5px solid rgba(167,139,250,0.2);border-radius:999px;font-size:13px;background:rgba(255,255,255,0.04);color:var(--txt);outline:none;font-family:'DM Sans',sans-serif}
.chat-input::placeholder{color:var(--txt3)}
.chat-input:focus{border-color:rgba(167,139,250,0.4)}
.chat-send{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#6d28d9);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.chat-send:hover{box-shadow:0 0 12px rgba(124,58,237,0.6)}
.chat-send svg{width:14px;height:14px;fill:white}

.fade-in{animation:fadeUp 0.5s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.d1{animation-delay:0.08s}.d2{animation-delay:0.18s}.d3{animation-delay:0.3s}.d4{animation-delay:0.42s}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar fade-in">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </div>
      <div>
        <div class="logo-text">PTE 分数查询工具</div>
        <div class="logo-sub">by Alexli</div>
      </div>
    </div>
  </div>

  <div class="hero fade-in d1">
    <div class="hero-eyebrow"><span class="el"></span>PTE Academic<span class="er"></span></div>
    <div class="hero-title"><span class="g1">PTE 分数</span><br><span class="g2">查询工具</span></div>
    <div class="hero-byline">crafted by <b>Alexli</b></div>
    <div class="glow-line"></div>
    <div class="hero-desc">覆盖英国、澳大利亚、新西兰、加拿大<br>主流院校与移民项目，数据直连官网</div>
  </div>

  <div class="fade-in d2">
    <div class="step-row"><div class="step-num">1</div><div class="step-lbl">选择场景</div></div>
    <div class="cat-row">
      <div class="cat-card active" onclick="setCat('study',this)">
        <div class="cat-icon">🎓</div>
        <div class="cat-name">学习 Study</div>
        <div class="cat-desc">本科 / 研究生院校申请</div>
      </div>
      <div class="cat-card" onclick="setCat('work',this)">
        <div class="cat-icon">✈️</div>
        <div class="cat-name">工作 &amp; 移民 Work / Immigration</div>
        <div class="cat-desc">签证 / 技术移民项目</div>
      </div>
    </div>
  </div>

  <div class="fade-in d3">
    <div class="step-row"><div class="step-num">2</div><div class="step-lbl">选择目标国家</div></div>
    <div class="country-row">
      <div class="c-pill active" onclick="setCountry('all',this)">🌏 全部</div>
      <div class="c-pill" onclick="setCountry('uk',this)">🇬🇧 英国</div>
      <div class="c-pill" onclick="setCountry('au',this)">🇦🇺 澳大利亚</div>
      <div class="c-pill" onclick="setCountry('nz',this)">🇳🇿 新西兰</div>
      <div class="c-pill" onclick="setCountry('ca',this)">🇨🇦 加拿大</div>
    </div>
  </div>

  <div class="fade-in d4">
    <div class="step-row"><div class="step-num">3</div><div class="step-lbl">搜索院校或项目</div></div>
    <div class="search-box">
      <div class="ac-wrap">
        <input id="searchInput" class="search-input" type="text"
          placeholder="输入院校名称，支持中英文（如"谢菲"、"Melbourne"）"
          oninput="onInput()" onkeydown="onKey(event)" autocomplete="off"/>
        <div class="autocomplete" id="acList" style="display:none"></div>
      </div>
      <button class="btn-search" onclick="doSearch()">搜索</button>
    </div>
  </div>

  <div class="results-area" id="results">
    <div class="state-box">
      <div class="state-icon">🔍</div>
      <div>请选择场景和国家，然后搜索院校</div>
    </div>
  </div>

</div>

<!-- 悬浮机器人 -->
<div class="bot-wrap">
  <div class="chat-window" id="chatWindow">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="chat-avatar">
          <svg viewBox="0 0 24 24"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7H3a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2zM7.5 13a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zm9 0a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zM3 21v-1a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v1H3z"/></svg>
        </div>
        <div>
          <div class="chat-title">PTE 小助手</div>
          <div class="chat-subtitle">通义千问驱动</div>
        </div>
      </div>
      <button class="chat-close" onclick="toggleChat()">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="msg bot">你好！我是 PTE 小助手 🎓<br>有什么不确定的，尽管问我！</div>
    </div>
    <div class="chat-input-row">
      <input class="chat-input" id="chatInput" type="text"
        placeholder="输入你的问题…"
        onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button class="chat-send" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <div class="bot-trigger" style="display:flex;align-items:center;gap:10px">
    <div class="bot-tooltip">不确定？就点我</div>
    <button class="bot-btn" onclick="toggleChat()">
      <svg viewBox="0 0 24 24"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7H3a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2zM7.5 13a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zm9 0a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zM3 21v-1a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v1H3z"/></svg>
    </button>
  </div>
</div>

<script>
let cat = 'study', country = 'all', acData = [], chatHistory = [];

function setCat(c, el) {
  cat = c;
  document.querySelectorAll('.cat-card').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  clearResults();
}
function setCountry(c, el) {
  country = c;
  document.querySelectorAll('.c-pill').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  clearResults();
}
function clearResults() {
  document.getElementById('results').innerHTML = '<div class="state-box"><div class="state-icon">🔍</div><div>请搜索院校名称开始查询</div></div>';
  document.getElementById('acList').style.display = 'none';
  document.getElementById('searchInput').value = '';
}

async function onInput() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) { document.getElementById('acList').style.display = 'none'; return; }
  try {
    const r = await fetch('/api/search', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ query: q, category: cat, country })
    });
    const d = await r.json();
    acData = d.results || [];
    const ac = document.getElementById('acList');
    if (!acData.length) { ac.style.display = 'none'; return; }
    ac.innerHTML = acData.map((s, i) =>
      `<div class="ac-item" onclick="pickAC(${i})">
        <div>${s.nameZh}</div><div class="ac-sub">${s.name}</div>
      </div>`).join('');
    ac.style.display = 'block';
  } catch(e) {}
}

function pickAC(i) {
  document.getElementById('searchInput').value = acData[i].nameZh;
  document.getElementById('acList').style.display = 'none';
  renderResults([acData[i]]);
}
function onKey(e) {
  if (e.key === 'Enter') doSearch();
  if (e.key === 'Escape') document.getElementById('acList').style.display = 'none';
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  document.getElementById('acList').style.display = 'none';
  document.getElementById('results').innerHTML = '<div class="state-box">查询中<span class="loading-dots"><span></span><span></span><span></span></span></div>';
  try {
    const r = await fetch('/api/search', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ query: q, category: cat, country })
    });
    const d = await r.json();
    if (d.results && d.results.length) { renderResults(d.results); return; }
    const r2 = await fetch('/api/ai-search', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ query: q, category: cat, country })
    });
    const d2 = await r2.json();
    renderResults(d2.results || []);
  } catch(e) {
    document.getElementById('results').innerHTML = '<div class="state-box">网络错误，请刷新重试</div>';
  }
}

function renderResults(list) {
  if (!list.length) {
    document.getElementById('results').innerHTML = '<div class="state-box"><div class="state-icon">🔍</div><div>未找到匹配结果，请尝试其他关键词</div></div>';
    return;
  }
  document.getElementById('results').innerHTML = list.map(s => `
    <div class="school-card">
      <div class="school-head">
        <span class="sflag">${s.flag}</span>
        <div><div class="sname">${s.nameZh}</div><div class="sname-en">${s.name}</div></div>
      </div>
      <div class="prog-wrap">
        <table class="ptab">
          <thead><tr><th>层次</th><th>项目</th><th>接受 PTE</th><th>总分</th><th>单项要求</th><th>更新</th><th>来源</th></tr></thead>
          <tbody>${s.programs.map(p => `
            <tr>
              <td>${p.level}</td>
              <td>${p.name}</td>
              <td>${p.accept===true?'<span class="badge yes"><span class="badge-dot"></span>接受</span>':p.accept===false?'<span class="badge no"><span class="badge-dot"></span>不接受</span>':'<span class="badge unk"><span class="badge-dot"></span>无信息</span>'}</td>
              <td>${p.accept&&p.overall?`<div class="score-big">${p.overall}</div>`:'—'}</td>
              <td>${p.accept&&p.reading?`<div class="score-parts">R:${p.reading} W:${p.writing} L:${p.listening} S:${p.speaking}</div>`:'—'}</td>
              <td><span class="upd">${p.updated||'—'}</span></td>
              <td><a class="src-link" href="${p.src}" target="_blank">官网 →</a></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`).join('');
}

// 悬浮机器人
function toggleChat() {
  const w = document.getElementById('chatWindow');
  w.classList.toggle('open');
  if (w.classList.contains('open')) setTimeout(() => document.getElementById('chatInput').focus(), 200);
}

async function sendMsg() {
  const input = document.getElementById('chatInput');
  const q = input.value.trim();
  if (!q) return;
  const msgs = document.getElementById('chatMessages');

  const userDiv = document.createElement('div');
  userDiv.className = 'msg user';
  userDiv.textContent = q;
  msgs.appendChild(userDiv);
  input.value = '';
  msgs.scrollTop = msgs.scrollHeight;

  chatHistory.push({ role: 'user', content: q });

  const typing = document.createElement('div');
  typing.className = 'msg bot typing';
  typing.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
  msgs.appendChild(typing);
  msgs.scrollTop = msgs.scrollHeight;

  try {
    const r = await fetch('/api/chat', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ messages: chatHistory })
    });
    const d = await r.json();
    msgs.removeChild(typing);
    const reply = d.reply || '抱歉，暂时无法回答，请稍后再试。';
    chatHistory.push({ role: 'assistant', content: reply });
    const botDiv = document.createElement('div');
    botDiv.className = 'msg bot';
    botDiv.textContent = reply;
    msgs.appendChild(botDiv);
  } catch(e) {
    msgs.removeChild(typing);
    const botDiv = document.createElement('div');
    botDiv.className = 'msg bot';
    botDiv.textContent = '连接失败，请检查网络后重试。';
    msgs.appendChild(botDiv);
  }
  msgs.scrollTop = msgs.scrollHeight;
}

document.addEventListener('click', e => {
  if (!e.target.closest('.ac-wrap')) document.getElementById('acList').style.display = 'none';
});
</script>
